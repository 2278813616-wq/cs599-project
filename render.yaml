services:
  - type: web
    name: superfoodie-cs599
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && aione setup --upstream-root upstreams && aione xhs note search --query test --page 1 --dry-run --output json
    startCommand: uvicorn src.api.routes:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PYTHONUTF8
        value: "1"
      - key: PYTHONIOENCODING
        value: utf-8
      - key: FOOD_SEARCH_MODE
        value: online_first
      - key: FOOD_SEARCH_ALLOW_FALLBACK
        value: "1"
      - key: LLM_API_BASE
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: LLM_MODEL
        value: qwen3.5-plus
      - key: LLM_SEND_ENABLE_THINKING
        value: "1"
      - key: LLM_TIMEOUT_SECONDS
        value: "35"
      - key: HOME_RECIPE_SOURCE_MODE
        value: xhs_first
      - key: HOME_RECIPE_XHS_WAIT_SECONDS
        value: "8"
      - key: HOME_RECIPE_SKIP_XHS_PROBE
        value: "1"
      - key: HOME_RECIPE_XHS_RACE_MODE
        value: "1"
      - key: HOME_RECIPE_XHS_BASELINE_EXTRA_WAIT_SECONDS
        value: "8"
      - key: HOME_RECIPE_XHS_TOTAL_CAP_SECONDS
        value: "24"
      - key: HOME_RECIPE_PLAN_MAX_TOKENS
        value: "500"
      - key: HOME_RECIPE_DETAIL_MAX_TOKENS
        value: "850"
      - key: HOME_RECIPE_DETAIL_REQUEST_TIMEOUT_SECONDS
        value: "25"
      - key: HOME_RECIPE_DETAIL_TIMEOUT_SECONDS
        value: "30"
      - key: AIONE_ENABLED
        value: "1"
      - key: AIONE_CLI_PATH
        value: aione
      - key: AIONE_TIMEOUT_SECONDS
        value: "20"
      - key: AIONE_XHS_HOME_DETAIL_CANDIDATE_LIMIT
        value: "3"
      - key: AIONE_XHS_HOME_DETAIL_TIMEOUT_SECONDS
        value: "25"
      - key: AIONE_XHS_PROBE_TIMEOUT_SECONDS
        value: "20"
      - key: AIONE_XHS_SEARCH_CANDIDATE_LIMIT
        value: "6"
      - key: AIONE_XHS_DETAIL_LIMIT
        value: "3"
      - key: AIONE_XHS_RECIPE_EXTRACT_TIMEOUT_SECONDS
        value: "12"
      - key: AIONE_XHS_RECIPE_SKIP_WEAK_TEXT
        value: "0"
      - key: AIONE_XHS_REFRESH_WEAK_CACHE
        value: "1"
      - key: AIONE_XHS_TAVILY_FALLBACK
        value: "1"
      - key: AIONE_XHS_TAVILY_MAX_RESULTS
        value: "5"
      - key: AIONE_XHS_COMMENT_STORE_LOOKUP
        value: "0"
      - key: MILVUS_FORCE_MOCK
        value: "1"
      - key: MAP_BUSINESS_AREA_CACHE_TTL_SECONDS
        value: "86400"
      - key: MAP_BUSINESS_AREA_RESULT_LIMIT
        value: "24"
      - key: GAODE_MAP_TIMEOUT_SECONDS
        value: "5"
      - key: LLM_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: TAVILY_IMAGE_TIMEOUT_SECONDS
        value: "20"
      - key: GAODE_API_KEY
        sync: false
      - key: GAODE_JS_API_KEY
        sync: false
      - key: GAODE_JS_SECURITY_CODE
        sync: false
      - key: AIONE_XHS_COOKIES
        sync: false
      - key: AIONE_XHS_PC_COOKIES
        sync: false
